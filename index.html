<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fun and interactive multiplication practice for kids. Master your math tables with instant feedback!">
  <title>Multiplication Tables for Kids</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔢</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="my_script.js" defer></script>
</head>
<body>
  <main class="container">
    <h1>Multiplication Practice</h1>
    
    <div class="controls">
      <label for="table-select">Choose a table:</label>
      <select id="table-select">
        <option value="all">All Tables (1-10)</option>
        <option value="1">Table of 1</option>
        <option value="2">Table of 2</option>
        <option value="3">Table of 3</option>
        <option value="4">Table of 4</option>
        <option value="5">Table of 5</option>
        <option value="6">Table of 6</option>
        <option value="7">Table of 7</option>
        <option value="8">Table of 8</option>
        <option value="9">Table of 9</option>
        <option value="10">Table of 10</option>
      </select>
      <button id="start-btn" class="primary">Start Practice</button>
    </div>
    <h2 id="table-title" style="display: none;"></h2>
    <div id="progress" style="display: none;"></div>
    <div class="score-counter">
      <div class="correct"><span aria-hidden="true">✅</span> <span id="correct-count">0</span> correct</div>
      <div class="incorrect"><span aria-hidden="true">❌</span> <span id="incorrect-count">0</span> incorrect</div>
    </div>
    <div id="table-container"></div>
    <div class="button-group">
      <button id="menu-btn" class="secondary">Main Menu</button>
      <button id="check-btn" class="primary">Check Answers</button>
      <button id="next-btn" style="display:none;">Next Table</button>
    </div>
  </main>
</body>
</html>
